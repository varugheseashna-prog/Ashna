<!DOCTYPE html>
<html>
<head>
    <title>Student Mark Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            margin-top: 60px;
        }

        .container {
            background-color: white;
            width: 320px;
            padding: 20px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 85%;
            padding: 10px;
            margin: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }

        #result {
            margin-top: 15px;
            font-size: 18px;
            color: green;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Student Mark Calculator</h2>

        <input type="number" id="m1" placeholder="Enter Subject 1 Marks">
        <input type="number" id="m2" placeholder="Enter Subject 2 Marks">
        <input type="number" id="m3" placeholder="Enter Subject 3 Marks">

        <br>
        <button onclick="calculateMarks()">Calculate</button>

        <div id="result"></div>
    </div>

    <script>
        function calculateMarks() {
            let m1 = parseFloat(document.getElementById("m1").value);
            let m2 = parseFloat(document.getElementById("m2").value);
            let m3 = parseFloat(document.getElementById("m3").value);

            // Validation
            if (isNaN(m1) || isNaN(m2) || isNaN(m3)) {
                document.getElementById("result").innerHTML = "Please enter all marks!";
                return;
            }

            let total = m1 + m2 + m3;
            let average = total / 3;

            document.getElementById("result").innerHTML =
                "Total = " + total + "<br>Average = " + average.toFixed(1);
        }
    </script>

</body>
</html>
