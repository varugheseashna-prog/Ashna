<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        input {
            padding: 8px;
            margin: 10px;
            width: 200px;
        }

        button {
            padding: 8px 15px;
            margin: 5px;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            font-size: 18px;
            color: blue;
        }
    </style>
</head>

<body>

    <h2>Simple Calculator</h2>

    <!-- Input fields -->
    <input type="number" id="num1" placeholder="Enter first number"><br>
    <input type="number" id="num2" placeholder="Enter second number"><br>

    <!-- Buttons -->
    <button onclick="add()">Addition</button>
    <button onclick="subtract()">Subtraction</button>

    <!-- Result display -->
    <div id="result"></div>

    <script>
        // Addition function
        function add() {
            let a = parseFloat(document.getElementById("num1").value);
            let b = parseFloat(document.getElementById("num2").value);

            let result = a + b;
            document.getElementById("result").innerHTML = "Result = " + result;
        }

        // Subtraction function
        function subtract() {
            let a = parseFloat(document.getElementById("num1").value);
            let b = parseFloat(document.getElementById("num2").value);

            let result = a - b;
            document.getElementById("result").innerHTML = "Result = " + result;
        }
    </script>

</body>
</html>
